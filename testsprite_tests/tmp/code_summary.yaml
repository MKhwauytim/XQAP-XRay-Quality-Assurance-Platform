version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: React 19 + Vite (SPA, single self-contained dist/index.html)
  - ui_library: Plain CSS co-located per component, RTL (dir=rtl), Arabic UI
  - other: xlsx (SheetJS CDN tarball), recharts, hash-wasm (Argon2id), File System Access API, Web Locks API, Web Worker (workbookWorker.ts)

routes:
  - path: /
    file: src/App.tsx
    auth_required: true
    description: >
      Single-page application — all navigation is tab-based (no URL routing).
      Login screen shown when unauthenticated. After login the app shell renders
      the Sidebar with tabs filtered by role + permission matrix.

features:
  - name: Bootstrap Admin Login
    description: >
      Hidden keyboard shortcut (Alt+A then Alt+T, or Arabic equivalent) opens an
      admin passcode modal. Correct passcode logs in as the bootstrap "admin" user.
      Passcode is verified with Argon2id via hash-wasm.
    files:
      - src/auth/AuthGate.tsx
      - src/auth/authConfig.ts
      - src/auth/passwordCrypto.ts
      - src/auth/authSession.ts
    entry_route: /
    user_interactions:
      - Press Alt+A then Alt+T (or Alt+ش then Alt+ف) to open admin modal
      - Enter admin passcode in the password field
      - Press Enter or click دخول button
      - See error message on wrong passcode
      - Session persists in localStorage for 7 days
    api_calls: []
    auth_required: false

  - name: Managed User Login
    description: >
      When at least one managed user exists, a username + password form is shown.
      Passwords verified with Argon2id (or legacy PBKDF2 with transparent upgrade).
      Session stored in localStorage with 7-day TTL.
    files:
      - src/auth/AuthGate.tsx
      - src/auth/userManagement.ts
      - src/auth/passwordCrypto.ts
      - src/auth/authSession.ts
    entry_route: /
    user_interactions:
      - Select or type username in the username field
      - Enter password
      - Click دخول button
      - See success or error message
      - Session persists across tab restarts for 7 days
    api_calls: []
    auth_required: false

  - name: Role-Preview Switcher (Admin only)
    description: >
      Admin toolbar shows a segmented pill switch (الإدارة / المدير / المشرف / الموظف / ضيف).
      Clicking a segment previews the app as that role without logging out.
      Amber toolbar + (معاينة) flag when impersonating. Resets on logout.
    files:
      - src/auth/AuthGate.tsx
      - src/auth/authSession.ts
      - src/auth/AuthGate.css
      - src/App.tsx
    entry_route: /
    user_interactions:
      - Click a role segment in the admin toolbar to switch preview role
      - App remounts showing tabs/permissions for the chosen role
      - Toolbar turns amber with (معاينة) indicator
      - Click الإدارة segment to exit preview
      - Click تسجيل الخروج to logout (clears preview)
    api_calls: []
    auth_required: true

  - name: Population Data Import (Excel)
    description: >
      Phase 1 of the core workflow. Upload a risk Excel file (and optionally a BI Excel file).
      Files are parsed in a Web Worker (SheetJS). Results show row counts, unknown sheets, errors.
      BI sheet detection falls back to sheet name if no Arabic pattern matches.
    files:
      - src/components/Sidebar/Tabs/Population/index.tsx
      - src/workers/workbookWorker.ts
      - src/components/Sidebar/Tabs/Population/biData/biDataWorkbook.ts
      - src/components/Sidebar/Tabs/Population/riskData/riskWorkbook.ts
    entry_route: /
    user_interactions:
      - Select Population tab from sidebar
      - Click to upload risk Excel file via file picker
      - Optionally upload BI Excel file
      - Watch progress bar during Web Worker parsing
      - Review workbook report (sheet summaries, row counts, unknown sheets)
    api_calls: []
    auth_required: true

  - name: Population Processing & Save
    description: >
      Phase 2. After import, user processes the population: deduplication, field normalization,
      CertScan classification. Results saved to workspace folder as population.final.json
      and month.manifest.json inside a dated month folder.
    files:
      - src/components/Sidebar/Tabs/Population/processing/
      - src/data/population/populationStorage.ts
    entry_route: /
    user_interactions:
      - Review imported data summary
      - Click معالجة المجتمع to process
      - View processing results and statistics
      - Confirm save to workspace folder
    api_calls: []
    auth_required: true

  - name: Stratified Sample Drawing
    description: >
      Phase 3. Hamilton apportionment by port, CertScan/NonCertScan split, Fisher-Yates
      random draw, capacity-weighted spillover. Results saved as sample.master.json.
    files:
      - src/data/sampling/sampleAlgorithm.ts
      - src/data/sampling/sampleStorage.ts
      - src/components/Sidebar/Tabs/Population/index.tsx
    entry_route: /
    user_interactions:
      - Click draw sample button
      - View sample size per port/tier breakdown
      - Confirm and save sample
    api_calls: []
    auth_required: true

  - name: Distribution / Assignment
    description: >
      Phase 4. Assign sampled rows to employees. Append-only event log
      (distribution.log.json). Derived snapshot (distribution.current.json).
    files:
      - src/data/distribution/distributionStorage.ts
      - src/data/distribution/distributionLog.ts
      - src/components/Sidebar/Tabs/Population/index.tsx
    entry_route: /
    user_interactions:
      - Select employees and quota per employee
      - Click assign / distribute
      - View assignment summary
    api_calls: []
    auth_required: true

  - name: Employee Workspace - صور الأشعة المحالة (Referrals Table)
    description: >
      Employees see their assigned X-ray samples. Supervisors/admins see all employees'
      rows and can toggle "الكل / مسنداتي فقط" between the search box and export button.
      Table supports column visibility, drag-reorder, date format toggles, XLSX export.
      Clicking a row expands an inline inspection form.
    files:
      - src/components/Sidebar/Tabs/EmployeeWorkspace/views/XrayReferrals.tsx
      - src/components/Sidebar/Tabs/EmployeeWorkspace/index.tsx
      - src/data/distribution/distributionStorage.ts
      - src/data/answers/answerStorage.ts
    entry_route: /
    user_interactions:
      - Select مساحة العمل → صور الأشعة المحالة from sidebar
      - Select month from dropdown
      - Select inspection template
      - Use الكل/مسنداتي فقط toggle (supervisors/admins only) between search and export
      - Search by typing in global search box
      - Click column header to sort
      - Click الأعمدة to open column picker
      - Click row to expand inline inspection form
      - Fill inspection form fields
      - Click حفظ مسودة or تقديم to save/submit answer
      - Click إحالة to request referral for selected rows (employees only)
      - Export visible rows to XLSX
    api_calls: []
    auth_required: true

  - name: Employee Workspace - Replacement Dialog
    description: >
      Admin can open a replacement dialog for a dead distribution entry.
      Candidates shown in two tabs (recommended / all), capped at 1000 random entries
      to prevent lag. Admin selects a replacement row and confirms.
    files:
      - src/components/Sidebar/Tabs/EmployeeWorkspace/views/XrayReferrals.tsx
      - src/data/distribution/replacement.ts
    entry_route: /
    user_interactions:
      - Click استبدال on a row (admin only)
      - View recommended and all candidate tabs (max 1000 each)
      - Select a candidate row
      - Enter reason for replacement
      - Click confirm to execute
    api_calls: []
    auth_required: true

  - name: Employee Workspace - نتائج فحص الأشعة (Inspection Results)
    description: >
      Read-only table showing inspection outcomes for the selected month.
      Includes تاريخ رصد الخبير (expert observation timestamp) column.
      No column picker — layout is fixed from the referrals preset.
    files:
      - src/components/Sidebar/Tabs/EmployeeWorkspace/views/XrayInspectionResults.tsx
    entry_route: /
    user_interactions:
      - Select نتائج فحص الأشعة sub-tab
      - Select month from dropdown
      - Browse results table
      - Export to XLSX
    api_calls: []
    auth_required: true

  - name: Employee Workspace - اعتماد الطلبات (Referral Approval)
    description: >
      Supervisors/admins approve or reject pending referral and replacement requests.
    files:
      - src/components/Sidebar/Tabs/EmployeeWorkspace/views/ReferralApproval.tsx
    entry_route: /
    user_interactions:
      - Select اعتماد الطلبات sub-tab
      - View pending referral requests
      - Click approve or reject
    api_calls: []
    auth_required: true

  - name: Template Builder
    description: >
      Admin builds inspection form templates: add fields (text, select, date, etc.),
      configure field visibility rules, save versions. Templates stored in workspace.
    files:
      - src/components/Sidebar/Tabs/TemplateBuilder/
      - src/data/templates/templateStorage.ts
    entry_route: /
    user_interactions:
      - Select نموذج الفحص tab (admin only)
      - Add/remove/reorder form fields
      - Set field type, label, options
      - Configure conditional visibility rules
      - Click save to persist template
    api_calls: []
    auth_required: true

  - name: Reports
    description: >
      Generate self-contained Arabic HTML reports for sample and distribution data.
      Reports include recharts visualizations.
    files:
      - src/components/Sidebar/Tabs/Reports/
      - src/data/reporting/
    entry_route: /
    user_interactions:
      - Select التقارير tab (supervisor/admin)
      - Select month
      - Click generate report
      - Download self-contained HTML report
    api_calls: []
    auth_required: true

  - name: Archive
    description: >
      Browse and restore backup snapshots stored in .system/backups/ inside the workspace.
    files:
      - src/components/Sidebar/Tabs/Archive/
      - src/data/backup/backupStorage.ts
    entry_route: /
    user_interactions:
      - Select الأرشيف tab (supervisor/admin)
      - Browse backup list
      - Click to view backup details
      - Restore a backup snapshot
    api_calls: []
    auth_required: true

  - name: User Management
    description: >
      Admin creates, edits, activates/deactivates managed users. Assigns roles
      (employee/supervisor/manager). Sets per-role tab permission matrix.
      Changes broadcast via DOM events to all open components.
    files:
      - src/components/Sidebar/Tabs/UserManagement/
      - src/auth/userManagement.ts
    entry_route: /
    user_interactions:
      - Select إدارة المستخدمين tab (admin only)
      - Click add user, fill username/password/role
      - Toggle user active/inactive
      - Edit permission matrix per role and tab
      - Save changes
    api_calls: []
    auth_required: true

  - name: Settings (Label Overrides)
    description: >
      Admin overrides UI label strings stored in localStorage (xray-labels-v1).
      All components re-render via useLabels() subscription on change.
    files:
      - src/components/Sidebar/Tabs/Settings/
      - src/data/labels/labelsStore.ts
      - src/data/labels/useLabels.ts
    entry_route: /
    user_interactions:
      - Select الإعدادات tab
      - Edit label values in the form
      - Click save to persist to localStorage
      - See all UI strings update live
    api_calls: []
    auth_required: true

  - name: Workspace Folder Selection
    description: >
      On first launch (or if no handle stored in IndexedDB) the user selects a root
      workspace folder via the File System Access API (showDirectoryPicker). Only works
      in Chromium browsers (Chrome/Edge). The handle is persisted to IndexedDB.
    files:
      - src/data/workspace/WorkspaceGate.tsx
      - src/data/workspace/WorkspacePicker.tsx
      - src/data/workspace/handleStore.ts
    entry_route: /
    user_interactions:
      - Click اختيار مجلد العمل button
      - Browser shows directory picker dialog
      - User grants permission to a folder
      - App loads with the selected workspace
    api_calls: []
    auth_required: false

known_limitations:
  - issue: File System Access API required — app only fully works in Chromium (Chrome/Edge); Firefox/Safari show unsupported_browser state
    location: src/data/workspace/WorkspaceGate.tsx
    impact: No workspace data can be read/written in non-Chromium browsers
  - issue: No backend — all role/permission checks run in the browser; a user can edit localStorage to self-elevate
    location: src/auth/
    impact: Auth is a UX guard only, not a trust boundary
  - issue: Bootstrap admin passcode hash ships in the client bundle (authConfig.ts) — offline crackable
    location: src/auth/authConfig.ts
    impact: Passcode must be strong; do not use a weak passcode
  - issue: showDirectoryPicker requires a user gesture — auto-restoring the workspace handle may prompt the user again after a browser restart
    location: src/data/workspace/handleStore.ts
    impact: Users may need to re-grant folder access after restarting the browser
  - issue: Excel parsing runs in a Web Worker; very large files (50k+ rows) may take 30–60 seconds
    location: src/workers/workbookWorker.ts
    impact: UI shows progress bar but cannot be cancelled mid-parse
